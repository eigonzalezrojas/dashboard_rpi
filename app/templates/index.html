<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Huerta</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">
  <h1 class="text-3xl font-bold mb-6">Dashboard Ambiental - Huerta</h1>

  <div class="flex flex-wrap gap-4 mb-6 items-center">
    <label class="flex items-center gap-2">Desde:
      <input type="date" id="fecha_inicio" class="border border-gray-300 rounded px-2 py-1">
    </label>
    <label class="flex items-center gap-2">Hasta:
      <input type="date" id="fecha_fin" class="border border-gray-300 rounded px-2 py-1">
    </label>
    <button onclick="cargarDatos()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Filtrar</button>
  </div>

  <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">Temperaturas</h3>
      <canvas id="graficoTemperatura"></canvas>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">Temperatura Agua</h3>
      <canvas id="graficoAgua"></canvas>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">Humedad</h3>
      <canvas id="graficoHumedad"></canvas>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">pH</h3>
      <canvas id="graficoPh"></canvas>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">EC (Conductividad)</h3>
      <canvas id="graficoEc"></canvas>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <h3 class="text-lg font-semibold mb-2">Sensor Suelo</h3>
      <canvas id="graficoSuelo"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>

</html>
